name = "timepiececare"
compatibility_date = "2024-09-23"
pages_build_output_dir = "./dist"

# Per-site env vars — set in Cloudflare Pages dashboard (as Secrets).
#
# MANDATORY (no fallback):
#   BING_SITE_VERIFICATION   — from Bing Webmaster Tools HTML tag method
#   INDEXNOW_KEY             — auto-generated by initialise-site.mjs (32-char hex); must match public/<key>.txt
#
# OPTIONAL (fall back to site.config.yaml if not set):
#   AMAZON_TAG              — Amazon Associates tracking ID
#   GA4_ID                  — Google Analytics 4 measurement ID
#   SITE_URL                — https://yourdomain.com (overrides site.config.yaml domain)
#
# NOT NEEDED if GSC is verified via DNS TXT record (recommended):
#   GOOGLE_SITE_VERIFICATION — only required if using GSC HTML tag verification method

[vars]
NODE_VERSION = "22"
